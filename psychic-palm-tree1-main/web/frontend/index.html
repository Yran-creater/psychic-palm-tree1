<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>上海地铁路径规划 · 演示</title>
  <link rel="stylesheet" href="/css/style.css" />
</head>
<body>
  <header class="topbar">
    <div class="brand">
      <span class="logo">🚇</span>
      <div>
        <h1>上海地铁路径规划</h1>
        <p class="subtitle">Web 演示前端 · 与 C++ 控制台程序分离部署</p>
      </div>
    </div>
    <div class="stats" id="statsBar">加载中…</div>
  </header>

  <main class="layout">
    <nav class="tabs">
      <button class="tab active" data-tab="path">路径规划</button>
      <button class="tab" data-tab="station">站点管理</button>
      <button class="tab" data-tab="network">网络分析</button>
    </nav>

    <!-- 路径规划 -->
    <section class="panel active" id="panel-path">
      <div class="card">
        <h2>查询路线</h2>
        <div class="form-grid">
          <label class="field">
            <span>起点</span>
            <input type="text" id="fromInput" placeholder="输入站名，如：松江大学城" autocomplete="off" />
            <ul class="suggest" id="fromSuggest"></ul>
          </label>
          <label class="field">
            <span>终点</span>
            <input type="text" id="toInput" placeholder="输入站名，如：上海松江站" autocomplete="off" />
            <ul class="suggest" id="toSuggest"></ul>
          </label>
        </div>

        <div class="mode-row">
          <label><input type="radio" name="mode" value="time" checked /> 时间最短</label>
          <label><input type="radio" name="mode" value="transfer" /> 换乘最少</label>
          <label><input type="radio" name="mode" value="time_k" /> 3条时间最优</label>
          <label><input type="radio" name="mode" value="transfer_k" /> 3条换乘最优</label>
        </div>

        <button class="btn primary" id="searchBtn">开始规划</button>
      </div>

      <div id="pathResults" class="results"></div>
    </section>

    <!-- 站点管理 -->
    <section class="panel" id="panel-station">
      <div class="card">
        <h2>站点查询与状态</h2>
        <div class="form-row">
          <input type="text" id="stationSearch" placeholder="搜索站名或线路" />
          <select id="lineFilter">
            <option value="">全部线路</option>
          </select>
        </div>
        <div class="table-wrap">
          <table>
            <thead>
              <tr>
                <th>ID</th>
                <th>站名</th>
                <th>线路</th>
                <th>状态</th>
                <th>操作</th>
              </tr>
            </thead>
            <tbody id="stationTable"></tbody>
          </table>
        </div>
      </div>
    </section>

    <!-- 网络分析 -->
    <section class="panel" id="panel-network">
      <div class="card">
        <h2>网络连通性</h2>
        <p class="hint">基于当前开放站点分析地铁网络是否断连（与控制台「连通性分析」一致）。</p>
        <button class="btn" id="connectivityBtn">刷新分析</button>
        <div id="connectivityResult" class="info-box"></div>
      </div>
    </section>
  </main>

  <footer class="footer">
    数据来源：<code>shanghai-subway/data/*.csv</code> · 后端独立运行于 <code>web/backend</code>
  </footer>

  <script src="/js/app.js"></script>
</body>
</html>
